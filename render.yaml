services:
  - type: web
    name: hr-attrition-backend
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r ../requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false # Set this in the Render dashboard manually
      - key: PYTHON_VERSION
        value: 3.12.0
